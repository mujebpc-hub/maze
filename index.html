<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Maze of the Watcher</title>

<link rel="stylesheet" href="style.css" />

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  overflow: hidden;
  background: black;
}

.hidden { display: none; }

/* GAME CONTAINER */
#gameContainer {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
}

/* Instructions */
#instructions {
  position: fixed;
  top: 10px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.6);
  padding: 8px 12px;
  border-radius: 8px;
  color: white;
  font-size: 14px;
  z-index: 10;
}

/* Screens */
#homeScreen, #loadingScreen, #gameOverScreen, #winScreen {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.85);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  color: white;
  z-index: 20;
}

/* Buttons */
button {
  padding: 12px 24px;
  margin: 10px;
  border: none;
  cursor: pointer;
  border-radius: 8px;
  background: #444;
  color: white;
}

button:hover {
  background: #666;
}

/* HUD */
#hud {
  position: absolute;
  top: 10px;
  left: 10px;
  display: flex;
  gap: 20px;
  z-index: 5;
  color: white;
}

#hud div {
  background: rgba(0,0,0,0.5);
  padding: 6px 10px;
  border-radius: 6px;
}

/* Health */
#healthBarContainer {
  width: 150px;
  height: 20px;
  background: #555;
  border-radius: 10px;
  overflow: hidden;
}

#healthBar {
  width: 100%;
  height: 100%;
  background: red;
}
</style>
</head>

<body>

<!-- Instructions -->
<div id="instructions">
  WASD to move | Mouse to look | Click to start
</div>

<!-- HOME SCREEN -->
<div id="homeScreen">
  <h1>Maze of the Watcher</h1>
  <p>Level: <span id="levelDisplay">1</span></p>
  <p>Coins: <span id="coinDisplay">0</span></p>
  <button id="playBtn">Play</button>
</div>

<!-- LOADING SCREEN -->
<div id="loadingScreen" class="hidden">
  <h2>Loading...</h2>
</div>

<!-- GAME SCREEN -->
<div id="gameScreen" class="hidden">
  
  <!-- ONLY ONE GAME CONTAINER -->
  <div id="gameContainer"></div>

  <!-- HUD -->
  <div id="hud">
    <div>Level: <span id="gameLevel">1</span></div>
    <div>Coins: <span id="gameCoins">0</span></div>
    <div id="healthBarContainer">
      <div id="healthBar"></div>
    </div>
  </div>

</div>

<!-- GAME OVER -->
<div id="gameOverScreen" class="hidden">
  <h1>Game Over</h1>
  <button id="restartBtn">Restart</button>
  <button id="homeBtn">Home</button>
</div>

<!-- WIN SCREEN -->
<div id="winScreen" class="hidden">
  <h1>You Escaped!</h1>
  <button id="nextLevelBtn">Next Level</button>
  <button id="homeBtn2">Home</button>
</div>

<!-- AUDIO -->
<audio id="bgMusic" loop src="audio/background.mp3"></audio>
<audio id="chaseSound" src="audio/chase.mp3"></audio>
<audio id="attackSound" src="audio/attack.mp3"></audio>
<audio id="winSound" src="audio/win.mp3"></audio>

<!-- THREE.JS (ONLY ONCE) -->
<script src="https://cdn.jsdelivr.net/npm/three@0.179.1/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.179.1/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.179.1/examples/js/controls/PointerLockControls.js"></script>

<!-- GAME FILES -->
<script src="levels.js"></script>
<script src="game.js" defer></script>

</body>
</html>
